{% extends "base/base_auth.html" %}
{% block title %}Novo lançamento — Financeiro{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="{% url 'financeiro:index' %}" class="text-gray-400 hover:text-gray-700">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h1 class="text-xl font-bold text-gray-900">Novo lançamento</h1>
</div>

<div class="card p-6 max-w-2xl">
  <form method="post">
    {% csrf_token %}
    <div class="flex flex-col gap-4">
      <div>
        <label class="label">Tipo</label>
        <div class="flex gap-3">
          <button type="button" class="flex-1 py-2.5 border-2 border-gray-900 rounded-xl text-sm font-medium text-gray-900 bg-white">Receita</button>
          <button type="button" class="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 bg-white">Despesa</button>
        </div>
      </div>
      <div>
        <label class="label">Descrição</label>
        <input type="text" class="input" placeholder="Ex: Honorários – Construtora Horizonte">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label">Valor</label>
          <input type="text" class="input" placeholder="R$ 0,00">
        </div>
        <div>
          <label class="label">Data</label>
          <input type="date" class="input">
        </div>
        <div>
          <label class="label">Categoria</label>
          <select class="select">
            <option>Honorário</option>
            <option>Honorário de Êxito</option>
            <option>Despesa do Escritório</option>
            <option>Reembolso</option>
            <option>Outro</option>
          </select>
        </div>
        <div>
          <label class="label">Cliente</label>
          <select class="select">
            <option value="">Nenhum</option>
            <option>Construtora Horizonte Ltda.</option>
            <option>Roberto Andrade</option>
          </select>
        </div>
        <div class="col-span-2">
          <label class="label">Processo vinculado</label>
          <select class="select">
            <option value="">Nenhum</option>
            <option>Construtora Horizonte vs. Município</option>
          </select>
        </div>
      </div>
    </div>
    <div class="flex gap-3 pt-5 border-t border-gray-100 mt-5">
      <button type="submit" class="btn-primary">Registrar lançamento</button>
      <a href="{% url 'financeiro:index' %}" class="btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
