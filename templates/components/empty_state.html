{# ─── Estado vazio padrão ──────────────────────────────────────────────────── #}
{# Uso: {% include "components/empty_state.html" with mensagem="Nenhum item" %} #}

<div class="flex flex-col items-center justify-center py-16 text-center">
  <div class="w-14 h-14 rounded-full bg-juridico-bege flex items-center justify-center mb-4">
    <svg class="w-7 h-7 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
  </div>
  <p class="text-gray-500 text-sm">{{ mensagem|default:"Nenhum item encontrado." }}</p>
  {% if acao_label and acao_url %}
    <a href="{{ acao_url }}" class="btn-primary mt-4">+ {{ acao_label }}</a>
  {% endif %}
</div>
