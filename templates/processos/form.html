{% extends "base/base_auth.html" %}
{% block title %}{% if modo == "novo" %}Novo processo{% else %}Editar processo{% endif %} — Jurídico SaaS{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="{% url 'processos:lista' %}" class="text-gray-400 hover:text-gray-700">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h1 class="text-xl font-bold text-gray-900">
    {% if modo == "novo" %}Novo processo{% else %}Editar processo{% endif %}
  </h1>
</div>

<div class="card p-6 max-w-2xl">
  <form method="post">
    {% csrf_token %}

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="col-span-2">
        <label class="label">Título do processo</label>
        <input type="text" class="input" placeholder="Ex: Construtora Horizonte vs. Município"
               value="{{ processo.titulo|default:'' }}">
      </div>

      <div>
        <label class="label">Número do processo</label>
        <input type="text" class="input" placeholder="0000000-00.0000.0.00.0000"
               value="{{ processo.numero|default:'' }}">
      </div>

      <div>
        <label class="label">Área do direito</label>
        <select class="select">
          <option>Cível</option>
          <option>Consumidor</option>
          <option>Trabalhista</option>
          <option>Sucessões</option>
          <option>Criminal</option>
          <option>Tributário</option>
        </select>
      </div>

      <div>
        <label class="label">Instância</label>
        <select class="select">
          <option>1ª Instância</option>
          <option>2ª Instância</option>
          <option>STJ</option>
          <option>STF</option>
        </select>
      </div>

      <div>
        <label class="label">Vara / Juízo</label>
        <input type="text" class="input" placeholder="Ex: 11ª Vara Cível"
               value="{{ processo.vara_juizo|default:'' }}">
      </div>

      <div>
        <label class="label">Valor da causa</label>
        <input type="text" class="input" placeholder="R$ 0,00">
      </div>

      <div>
        <label class="label">Cliente</label>
        <select class="select">
          <option value="">Selecionar cliente...</option>
          {# Futuramente: populado com queryset de clientes reais #}
          <option>Construtora Horizonte Ltda.</option>
          <option>Roberto Andrade</option>
        </select>
      </div>

      <div>
        <label class="label">Próximo prazo</label>
        <input type="date" class="input">
      </div>
    </div>

    <div class="flex gap-3 pt-4 border-t border-gray-100">
      <button type="submit" class="btn-primary">
        {% if modo == "novo" %}Criar processo{% else %}Salvar alterações{% endif %}
      </button>
      <a href="{% url 'processos:lista' %}" class="btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
